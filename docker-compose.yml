# ══════════════════════════════════════════════════════════
# OpenMTSN — Full Simulation Sandbox
# ══════════════════════════════════════════════════════════
# Launch: docker compose up -d
# Dashboard: http://localhost:5173
# API Docs:  http://localhost:8000/docs

services:
  # ── MQTT Broker (Eclipse Mosquitto) ─────────────────
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: mtsn-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./simulator/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Redis (State Store) ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mtsn-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── FastAPI Control Plane ───────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: mtsn-api
    ports:
      - "8000:8000"
      - "443:443/udp"
    environment:
      MTSN_CORS_ORIGINS: '["http://localhost:5173","http://localhost:80"]'
      MTSN_API_KEY: "openmtsn-secret-key-2026"
      MTSN_DASHBOARD_SECRET: "dashboard-access-key-2026"
      MTSN_MTLS_REQUIRED: "true"
      MTSN_CA_CERT_PATH: "/certs/ca.crt"
      MTSN_SERVER_CERT_PATH: "/certs/server.crt"
      MTSN_SERVER_KEY_PATH: "/certs/server.key"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./certs:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 512M
    restart: unless-stopped

  # ── React Command Center Dashboard ─────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: mtsn-dashboard
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

  # ── Simulated Edge Agent: node-alpha ────────────────
  node-alpha:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: mtsn-node-alpha
    environment:
      MTSN_NODE_ID: "node-alpha"
      MTSN_MQTT_HOST: "mqtt-broker"
      MTSN_MQTT_PORT: "1883"
      MTSN_GPS_LON: "77.2090"
      MTSN_CLIENT_CERT: "/certs/node-alpha.crt"
      MTSN_CLIENT_KEY: "/certs/node-alpha.key"
      MTSN_CA_CERT: "/certs/ca.crt"
      MTSN_API_URL: "https://api:8000"
    volumes:
      - ./certs:/certs:ro
    depends_on:
      - mqtt-broker
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 256M
    restart: unless-stopped
    cap_add:
      - NET_ADMIN    # Required for chaos testing with tc

  # ── Simulated Edge Agent: node-beta ─────────────────
  node-beta:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: mtsn-node-beta
    environment:
      MTSN_NODE_ID: "node-beta"
      MTSN_MQTT_HOST: "mqtt-broker"
      MTSN_MQTT_PORT: "1883"
      MTSN_GPS_LON: "-118.2437"
      MTSN_CLIENT_CERT: "/certs/node-beta.crt"
      MTSN_CLIENT_KEY: "/certs/node-beta.key"
      MTSN_CA_CERT: "/certs/ca.crt"
      MTSN_API_URL: "https://api:8000"
    volumes:
      - ./certs:/certs:ro
    depends_on:
      - mqtt-broker
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 256M
    restart: unless-stopped

  # ── Simulated Edge Agent: node-gamma ────────────────
  node-gamma:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: mtsn-node-gamma
    environment:
      MTSN_NODE_ID: "node-gamma"
      MTSN_MQTT_HOST: "mqtt-broker"
      MTSN_MQTT_PORT: "1883"
      MTSN_GPS_LON: "151.2093"
      MTSN_CLIENT_CERT: "/certs/node-gamma.crt"
      MTSN_CLIENT_KEY: "/certs/node-gamma.key"
      MTSN_CA_CERT: "/certs/ca.crt"
      MTSN_API_URL: "https://api:8000"
    volumes:
      - ./certs:/certs:ro
    depends_on:
      - mqtt-broker
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 256M
    restart: unless-stopped

  # ── Observability: Prometheus ──────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: mtsn-prometheus
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ── Observability: Grafana ─────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: mtsn-grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    ports:
      - "3000:3000"
    restart: unless-stopped

  # ── Observability: cAdvisor ───────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: mtsn-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8081:8080"
    restart: unless-stopped

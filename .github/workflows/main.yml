# ══════════════════════════════════════════════════════════
# OpenMTSN — CI/CD Pipeline
# ══════════════════════════════════════════════════════════
# Triggers:
#   • Pull Requests → Lint + Test + Mutation Test
#   • Push to main  → Build multi-arch Docker images → Push to GHCR
# ══════════════════════════════════════════════════════════

name: OpenMTSN CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Lint & Format Check ─────────────────────────────
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python linters
        run: pip install ruff black

      - name: Ruff check
        run: ruff check api/

      - name: Black check
        run: black --check --line-length 99 api/

      # JavaScript / TypeScript
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci 2>/dev/null || npm install

      - name: Prettier check
        working-directory: dashboard
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}"

  # ── Python Tests ────────────────────────────────────
  test-api:
    name: "🧪 API Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: api
        run: pip install -e ".[dev]"

      - name: Run pytest
        working-directory: api
        run: pytest -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: api/test-results.xml

  # ── Mutation Tests ──────────────────────────────────
  mutation-test:
    name: "🧬 Mutation Tests"
    runs-on: ubuntu-latest
    needs: test-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: api
        run: pip install -e ".[dev]"

      - name: Run mutmut
        working-directory: api
        run: |
          mutmut run --paths-to-mutate=app/routing_engine.py --no-progress 2>&1 || true
          echo "## Mutation Test Results" >> $GITHUB_STEP_SUMMARY
          mutmut results >> $GITHUB_STEP_SUMMARY 2>&1 || true

  # ── Rust Agent Tests ────────────────────────────────
  test-agent:
    name: "🦀 Agent Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            agent/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('agent/Cargo.toml') }}

      - name: Run cargo test
        working-directory: agent
        run: cargo test --verbose

  # ── Build & Push Docker Images (main only) ──────────
  docker-build:
    name: "🐳 Build & Push"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-api, test-agent]
    strategy:
      matrix:
        include:
          - service: api
            context: ./api
            image: api
          - service: dashboard
            context: ./dashboard
            image: dashboard
          - service: agent
            context: ./agent
            image: agent
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for ARM64 cross-compile)
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Zero-Downtime Deploy (main only) ────────────────
  deploy:
    name: "🚀 Deploy"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "${DEPLOY_HOST}" ]; then
            echo "⚠️  No DEPLOY_HOST configured — skipping deployment"
            echo "Set DEPLOY_HOST, DEPLOY_USER, and DEPLOY_SSH_KEY secrets for live deployment"
            exit 0
          fi

          mkdir -p ~/.ssh
          echo "${DEPLOY_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" << 'DEPLOY_SCRIPT'
            set -e
            cd /opt/openmtsn

            # Pull latest images
            docker compose pull

            # Rolling restart (zero-downtime)
            docker compose up -d --remove-orphans --force-recreate --no-build

            # Wait and verify
            sleep 10
            curl -sf http://localhost:8000/health || {
              echo "Health check failed — rolling back"
              docker compose down
              docker compose up -d
              exit 1
            }

            echo "✅ Deployment successful"
          DEPLOY_SCRIPT
